server:
  port: 8080                         # 应用启动端口

spring:
  application:
    name: ai-alibaba-demo
  ai:
    dashscope:
      api-key: sk-3bdd93dbe51e40819d2cecbdc0b6e1d4 # 从环境变量读取您已拥有的百炼 API‑Key
      chat:
        options:
          max-tokens: 1000                      # 限制模型单次输出最大 Token 数
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  redis:
    redisson:
      config: |
        {
          "singleServerConfig": {
            "address": "redis://localhost:6379"
          }
        }
app:
  conversation:
    max-messages: 20       # 滑动窗口：最多保留最近 20 条消息（约 10 轮）
    ttl: 3d                # Redis 会话过期时间（3 天）
  agent:
    max-iterations: 5      # 最大推理/行动循环次数，防止死循环浪费 Token