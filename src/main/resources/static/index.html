<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生活助手 - 小 A</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4f5bd5, #962fbf);
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-msg {
            align-self: flex-end;
            background: #e3f2fd;
            border-bottom-right-radius: 4px;
        }
        .bot-msg {
            align-self: flex-start;
            background: #f5f5f5;
            border-bottom-left-radius: 4px;
            /* 允许流式输出时追加内容 */
            white-space: pre-wrap;
        }
        .input-area {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid #e0e0e0;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-area input:focus {
            border-color: #667eea;
        }
        .input-area button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: opacity 0.3s;
        }
        .input-area button:hover { opacity: 0.85; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ccc;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">🤖 AI 生活助手 - 小 A</div>
    <div class="messages" id="messages">
        <div class="message bot-msg">
            你好！我是小 A，可以帮你查天气、记备忘录、计算数学表达式。请随时提问 😊
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的问题..."
               onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    // 辅助函数：在聊天区添加一条消息，返回该消息的 DOM 元素
    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + (isUser ? 'user-msg' : 'bot-msg');
        msgDiv.textContent = text;
        document.getElementById('messages').appendChild(msgDiv);
        document.getElementById('messages').scrollTop =
            document.getElementById('messages').scrollHeight;
        return msgDiv;   // 返回元素引用，方便后续流式追加
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const message = input.value.trim();
        if (!message) return;

        // 显示用户消息
        addMessage(message, true);
        input.value = '';
        input.disabled = true;

        // 创建助手消息的占位气泡，初始为空，后续流式填充
        const botMsgDiv = addMessage('', false);
        // 添加一个加载动画（小圆点）
        const loadingSpan = document.createElement('span');
        loadingSpan.className = 'loading';
        botMsgDiv.appendChild(loadingSpan);

        try {
            // 使用 POST 请求发送到流式接口
            const response = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            if (!response.ok) {
                throw new Error('服务器响应错误 ' + response.status);
            }

            // 获取可读流
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';           // 存放未处理完的字节
            let removeLoading = false; // 是否已移除加载动画

            // 循环读取流数据
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // 将新数据追加到缓冲区
                buffer += decoder.decode(value, { stream: true });

                // 按行分割，处理完整的 SSE 消息
                const lines = buffer.split('\n');
                // 最后一行可能不完整，保留到下次处理
                buffer = lines.pop();

                for (const line of lines) {
                    // SSE 格式：每一行如果以 "data:" 开头，后面就是数据
                    if (line.startsWith('data:')) {
                        const data = line.substring(5).trim();
                        if (data === '[DONE]') continue;   // 如果流结束标记，跳过

                        // 第一次收到数据时，移除加载动画
                        if (!removeLoading) {
                            loadingSpan.remove();
                            removeLoading = true;
                        }

                        // 将文本追加到助手气泡中
                        botMsgDiv.textContent += data;
                    }
                }

                // 自动滚到底部
                document.getElementById('messages').scrollTop =
                    document.getElementById('messages').scrollHeight;
            }
        } catch (error) {
            // 出错时先移除加载动画（如果还在）
            if (botMsgDiv.contains(loadingSpan)) {
                loadingSpan.remove();
            }
            botMsgDiv.textContent = '抱歉，与助手通信时出现错误：' + error.message;
        } finally {
            input.disabled = false;
            input.focus();
        }
    }
</script>
</body>
</html>
