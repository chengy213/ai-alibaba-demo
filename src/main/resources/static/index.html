<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 生活助手 · 小 A</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .chat-container {
            width: 100%; max-width: 600px; height: 80vh;
            background: white; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4f5bd5, #962fbf);
            color: white; padding: 16px; text-align: center;
            font-size: 20px; font-weight: bold;
        }
        .messages {
            flex: 1; padding: 16px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
        }
        .message {
            max-width: 80%; padding: 12px 16px; border-radius: 18px;
            line-height: 1.5; word-wrap: break-word; white-space: pre-wrap;
        }
        .user-msg {
            align-self: flex-end; background: #e3f2fd; border-bottom-right-radius: 4px;
        }
        .bot-msg {
            align-self: flex-start; background: #f5f5f5; border-bottom-left-radius: 4px;
        }
        .input-area {
            display: flex; padding: 12px 16px; border-top: 1px solid #e0e0e0; gap: 8px;
        }
        .input-area input {
            flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0;
            border-radius: 24px; font-size: 14px; outline: none;
        }
        .input-area input:focus { border-color: #667eea; }
        .input-area button {
            padding: 12px 20px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 24px; cursor: pointer; font-size: 14px;
        }
        .loading {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid #ccc; border-top-color: #667eea;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">🤖 AI 生活助手 · 小 A</div>
    <div class="messages" id="messages">
        <!-- 消息会动态填充 -->
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的问题..."
               onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    // 从 URL query string 获取 userId，如 ?userId=123，默认为 1
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('userId') || '1';

    // 页面加载时获取历史记录
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch(`/api/history?userId=${encodeURIComponent(userId)}`);
            if (!response.ok) throw new Error('加载历史失败');
            const history = await response.json();
            // 渲染历史消息
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = ''; // 清空初始占位
            history.forEach(msg => {
                addMessage(msg.content, msg.role === 'user');
            });
        } catch (err) {
            console.error(err);
            // 如果加载失败，显示默认欢迎语
            document.getElementById('messages').innerHTML = `
                <div class="message bot-msg">
                    你好！我是小 A，可以帮你查天气、记备忘录、算数学表达式 😊
                </div>
            `;
        }
    });

    function addMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + (isUser ? 'user-msg' : 'bot-msg');
        msgDiv.textContent = text;
        const messages = document.getElementById('messages');
        messages.appendChild(msgDiv);
        messages.scrollTop = messages.scrollHeight;
        return msgDiv;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const message = input.value.trim();
        if (!message) return;

        addMessage(message, true);
        input.value = '';
        input.disabled = true;

        const botDiv = addMessage('', false);
        const loadingSpan = document.createElement('span');
        loadingSpan.className = 'loading';
        botDiv.appendChild(loadingSpan);

        try {
            const response = await fetch(`/api/chat/stream?userId=${encodeURIComponent(userId)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });

            if (!response.ok) throw new Error('服务器响应错误 ' + response.status);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let removeLoading = false;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (line.startsWith('data:')) {
                        const text = line.substring(5).trim();  // 去掉 "data:" 前缀
                        if (!text) continue;
                        if (!removeLoading) {
                            loadingSpan.remove();
                            removeLoading = true;
                        }
                        botDiv.textContent += text;
                    }
                }
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        } catch (err) {
            if (botDiv.contains(loadingSpan)) loadingSpan.remove();
            botDiv.textContent = '抱歉，出错啦：' + err.message;
        } finally {
            input.disabled = false;
            input.focus();
        }
    }
</script>
</body>
</html>
